<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>American Deli</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Georgia', serif; background: #1a1a1a; color: #f5f0e8; }
    header {
      background: #c8102e;
      padding: 2rem;
      text-align: center;
    }
    header h1 {
      font-size: 3rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
    }
    header p {
      font-size: 1rem;
      color: #ffd700;
      margin-top: 0.5rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    main {
      max-width: 900px;
      margin: 4rem auto;
      padding: 0 2rem;
      text-align: center;
    }
    main h2 {
      font-size: 2rem;
      color: #ffd700;
      margin-bottom: 1rem;
    }
    main p {
      font-size: 1.1rem;
      line-height: 1.8;
      color: #ccc;
    }
    footer {
      text-align: center;
      padding: 2rem;
      color: #555;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>American Deli</h1>
    <p>Fresh. Bold. Classic.</p>
  </header>
  <main>
    <h2>Welcome</h2>
    <p>Home of authentic deli sandwiches, wings, and subs made fresh daily. Quality ingredients, bold flavors — the real American way.</p>
  </main>
  <footer>
    &copy; 2026 American Deli. All rights reserved.
  </footer>
</body>
</html>
